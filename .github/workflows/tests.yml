name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: resource_cleanup_testing
          POSTGRES_USER: testing
          POSTGRES_PASSWORD: testing
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U testing -d resource_cleanup_testing"
          --health-interval 3s
          --health-timeout 5s
          --health-retries 10

    strategy:
      fail-fast: false
      matrix:
        php: ["8.2", "8.3"]
        laravel: ["9.*", "10.*", "11.*", "12.*"]
        exclude:
          # Laravel 11+ requires PHP 8.2+, already satisfied here.
          # Laravel 9 and 10 are compatible with PHP 8.2 and 8.3.
          # No exclusions needed, but keep this block for clarity.
          - php: "8.2"
            laravel: "9.*" # Laravel 9 supports PHP 8.0+, valid combo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pdo, pdo_pgsql
          coverage: none

      - name: Install dependencies
        run: |
          composer require "illuminate/support:${{ matrix.laravel }}" \
                           "illuminate/database:${{ matrix.laravel }}" \
                           "illuminate/console:${{ matrix.laravel }}" \
                           --no-update

          composer update --prefer-stable --prefer-dist --no-interaction

      - name: Run tests
        run: vendor/bin/phpunit
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: resource_cleanup_testing
          DB_USERNAME: testing
          DB_PASSWORD: testing
