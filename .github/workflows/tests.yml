name: Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
  
jobs:
  test:
    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # Laravel 8 — testbench ^6.0 supports PHP 7.3–8.1
          - php: "8.1"
            laravel: "8.*"
            testbench: "^6.0"
          # Laravel 9 — testbench ^7.0 supports PHP 8.0–8.1
          - php: "8.1"
            laravel: "9.*"
            testbench: "^7.0"
          # Laravel 10 — testbench ^8.0 supports PHP 8.1–8.3
          - php: "8.1"
            laravel: "10.*"
            testbench: "^8.0"
          - php: "8.2"
            laravel: "10.*"
            testbench: "^8.0"
          - php: "8.3"
            laravel: "10.*"
            testbench: "^8.0"
          # Laravel 11 — testbench ^9.0 supports PHP 8.2–8.3
          - php: "8.2"
            laravel: "11.*"
            testbench: "^9.0"
          - php: "8.3"
            laravel: "11.*"
            testbench: "^9.0"
          # Laravel 12 — testbench ^10.0 supports PHP 8.2–8.3
          - php: "8.2"
            laravel: "12.*"
            testbench: "^10.0"
          - php: "8.3"
            laravel: "12.*"
            testbench: "^10.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pdo, pdo_sqlite, sqlite3
          coverage: none

      - name: Install dependencies
        run: |
          composer require "illuminate/support:${{ matrix.laravel }}" \
                           "illuminate/database:${{ matrix.laravel }}" \
                           "illuminate/console:${{ matrix.laravel }}" \
                           "orchestra/testbench:${{ matrix.testbench }}" \
                           --no-update

          composer config audit.block-insecure false
          composer update --prefer-stable --prefer-dist --no-interaction

      - name: Run tests
        run: vendor/bin/phpunit
